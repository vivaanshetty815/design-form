<head>
<title>Feedback Form</title>
<style>

body {
font-family: Arial;
background-color: black;
text-align: center;
height: 100%;
margin: 0;
padding: 0;
}

table {
width: 100%;
height: 90vh;
margin-top: 70px;
border-collapse: collapse;
}

td {
background-color: #15E6CD;
border: 3px solid black;
padding: 20px;
vertical-align: top;
width: 33%;
}

p {
color: #080A0D;
font-weight: bold;
}

input[type="text"] {
width: 100%;
border: none;
border-bottom: 2px solid #080A0D;
background: transparent;
margin-top: 8px;
font-family: Arial;
color: #080A0D;
outline: none;
}

textarea {
width: 100%;
background: transparent;
border: none;
border-bottom: 2px solid #080A0D;
font-family: Arial;
color: #080A0D;
outline: none;
resize: none;
font-size: 14px;
}

.star {
font-size: 30px;
cursor: pointer;
color: transparent;
-webkit-text-stroke: 2px #080A0D;
}

.star.filled {
color: #080A0D;
}

button {
margin-top: 20px;
padding: 12px 40px;
font-family: Arial;
font-size: 16px;
background-color: black;
color: #15E6CD;
border: 2px solid #15E6CD;
cursor: pointer;
}
</style>
</head>
<body>
<form action="https://formsubmit.co/7fd8802902fee1b14048b0743ef1c07b" method="POST">
<table>
<tr>
<td rowspan="2">
<p style="margin-top: 50px;">In a brief summary what did you learn from the website?</p>
<textarea name="learn" rows="1"></textarea>
</td>
<td>

<p>Rate my website!</p>
<span class="star" onclick="rate(1)">★</span>
<span class="star" onclick="rate(2)">★</span>
<span class="star" onclick="rate(3)">★</span>
<span class="star" onclick="rate(4)">★</span>
<span class="star" onclick="rate(5)">★</span>
<input type="hidden" name="star_rating" id="star_rating" value="0">
</td>
<td rowspan="2">

<p style="margin-top: 50px;">What was the best part of my website?</p>
<input type="checkbox" id="homepage" name="best_part_homepage" value="Homepage">
<label for="homepage"> Homepage</label><br><br>
<input type="checkbox" id="evolution" name="best_part_evolution" value="Evolution">
<label for="evolution"> Evolution</label><br><br>
<input type="checkbox" id="communities" name="best_part_communities" value="Communities">
<label for="communities"> Communities</label><br><br>
<input type="checkbox" id="form" name="best_part_form" value="Form">
<label for="form"> Form</label><br><br>
<input type="checkbox" id="advert" name="best_part_advert" value="Ad display">
<label for="advert"> Ad display</label>
</td>
</tr>
<tr>
<td>
<p>Any Feedback:</p>
<textarea name="feedback" rows="1"></textarea>
</td>
</tr>
</table>

<button type="submit">Submit Feedback</button>
</form>

<script>
function rate(num) {
var stars = document.querySelectorAll('.star');
for (var i = 0; i < stars.length; i++) {
if (i < num) {
stars[i].classList.add('filled');
} else {
stars[i].classList.remove('filled');
}
}
document.getElementById('star_rating').value = num;
}
</script>

</body>
</html>
