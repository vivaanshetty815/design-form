<!DOCTYPE html>
<html>
<head>
  <title>Feedback Form</title>
  <style>
html, body {
      font-family: Arial;
      background-color: black;
      text-align: center;
      height: 100%;
      margin: 0;
      padding: 0;
}

table {
      width: 100%;
      height: 90vh;
      margin-top: 70px;
      border-collapse: collapse;
}

td {
      background-color: #15E6CD;
      border: 3px solid black;
      padding: 20px;
      vertical-align: top;
      width: 33%;
}

p {
      color: #080A0D;
      font-weight: bold;
}

input[type="text"] {
      width: 100%;
      border: none;
      border-bottom: 2px solid #080A0D;
      background: transparent;
      margin-top: 8px;
      font-family: Arial;
      color: #080A0D;
      outline: none;
}

input[type="email"] {
      width: 300px;
      padding: 10px;
      margin-top: 10px;
      font-family: Arial;
      font-size: 14px;
      border: 2px solid #15E6CD;
      background-color: black;
      color: #15E6CD;
      outline: none;
}

.email-label {
      color: #15E6CD;
      font-family: Arial;
      font-weight: bold;
      margin-top: 20px;
      display: block;
}

.star {
      font-size: 30px;
      cursor: pointer;
      color: transparent;
      -webkit-text-stroke: 2px #080A0D;
}

.star.filled {
      color: #080A0D;
}

button {
      margin-top: 20px;
      padding: 12px 40px;
      font-family: Arial;
      font-size: 16px;
      background-color: black;
      color: #15E6CD;
      border: 2px solid #15E6CD;
      cursor: pointer;
}
  </style>
</head>
<body>

<form action="https://formsubmit.co/vivaan.shetty@oberoi-is.net" method="POST">
<table>
    <tr>

      <td rowspan="2">
        <p style="margin-top: 50px;">In a brief summary what did you learn from the website?</p>
        <input type="text"><br>
        <input type="text"><br>
        <input type="text"><br>
        <input type="text"><br>
        <input type="text"><br>
        <input type="text"><br>
      </td>

      <td>
        <p>Rate my website!</p>
        <span class="star" onclick="rate(1)">★</span>
        <span class="star" onclick="rate(2)">★</span>
        <span class="star" onclick="rate(3)">★</span>
        <span class="star" onclick="rate(4)">★</span>
        <span class="star" onclick="rate(5)">★</span>
      </td>

      <td rowspan="2">
        <p style="margin-top: 50px;">What was the best part of my website?</p>
        <input type="radio" name="page"> Homepage<br><br>
        <input type="radio" name="page"> Evolution<br><br>
        <input type="radio" name="page"> Communities<br><br>
        <input type="radio" name="page"> Form<br><br>
        <input type="radio" name="page"> Ad display<br>
      </td>

    </tr>
    <tr>

      <td>
        <p>Any Feedback:</p>
        <input type="text"><br>
        <input type="text"><br>
        <input type="text"><br>
        <input type="text"><br>
        <input type="text"><br>
      </td>

    </tr>
</table>

  <label class="email-label">Enter your email:</label>
  <input type="email" placeholder="example@email.com">
  <br>

  <button type="submit">Submit Feedback</button>
</form>

  <script>
    function rate(num) {
      var stars = document.querySelectorAll('.star');
      for (var i = 0; i < stars.length; i++) {
        if (i < num) {
          stars[i].classList.add('filled');
        } else {
          stars[i].classList.remove('filled');
        }
      }
    }
  </script>

</body>
</html>
